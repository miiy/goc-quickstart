{{ define "footer" }}
<footer class="site-footer">
    <div class="app-container py-6">
        <div class="grid grid-cols-[minmax(0,1fr)_auto] items-start gap-6">
            <div class="min-w-0">
                <div class="mb-2">
                    <a class="site-brand" href="/">{{ .Site.Name }}</a>
                </div>
                {{if .Site.Description}}
                <p class="max-w-md text-sm text-slate-500">{{ .Site.Description }}</p>
                {{end}}
            </div>
            <nav class="flex flex-wrap justify-end gap-x-4 gap-y-2 text-right text-sm">
                <a class="ui-link-muted" href="/about">关于</a>
                <a class="ui-link-muted" href="javascript:void(0)">建议反馈</a>
                <a class="ui-link-muted" href="javascript:void(0)">内容举报</a>
                <a class="ui-link-muted" href="javascript:void(0)">隐私政策</a>
                <a class="ui-link-muted" href="javascript:void(0)">服务条款</a>
                <a class="ui-link-muted" href="javascript:void(0)">联系我们</a>
            </nav>
        </div>
        <div class="mt-6 site-footer-custom">
            {{ template "footer_custom" . }}
        </div>
    </div>
</footer>
{{ end }}
