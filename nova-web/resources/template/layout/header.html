{{ define "header" }}
<header class="sticky-top">
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
        <div class="container">
            <a class="navbar-brand" href="/">{{ "app.name" | config }}</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/posts">文章</a>
                    </li>
                </ul>
                <ul class="navbar-nav mb-2 mb-lg-0">
                    {{if not .IsLoggedIn}}
                    <li class="nav-item">
                        <a class="nav-link" href="/register">注册</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login">登录</a>
                    </li>
                    {{else}}
                    <li class="nav-item">
                        <a class="nav-link" href="/user/profile">{{ if .CurrentUser }}{{ .CurrentUser.Username }}{{ else }}用户中心{{ end }}</a>
                    </li>
                    <li class="nav-item d-flex align-items-center">
                        <form method="POST" action="/auth/logout" class="m-0">
                            <input type="hidden" name="_csrf" value="{{ .CSRFToken }}">
                            <button type="submit" class="nav-link btn btn-link p-0">退出</button>
                        </form>
                    </li>
                    {{end}}
                </ul>
            </div>
        </div>
    </nav>
</header>
{{ end }}
