{{ define "header" }}
<header class="site-header">
    <nav>
        <div class="site-nav">
            <!-- Brand and desktop primary navigation. -->
            <div class="flex items-center gap-6">
                <a class="site-brand" href="/">{{ .Site.Name }}</a>
                <ul class="hidden items-center gap-1 lg:flex">
                    <li>
                        <a class="site-nav-link" href="/posts">文章</a>
                    </li>
                </ul>
            </div>
            <!-- Mobile menu toggle. -->
            <button class="site-nav-toggle" type="button" data-nav-toggle aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="sr-only">Toggle navigation</span>
                <svg aria-hidden="true" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 5.75A.75.75 0 0 1 3.75 5h12.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 5.75Zm0 4A.75.75 0 0 1 3.75 9h12.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 9.75Zm0 4A.75.75 0 0 1 3.75 13h12.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 13.75Z" clip-rule="evenodd" />
                </svg>
            </button>
            <!-- Desktop account actions, mounted by frontend/src/components/HeaderActions. -->
            <div class="hidden items-center gap-6 lg:flex">
                <div
                    data-header-actions
                    data-variant="desktop"
                    data-register-enabled="{{ if .Site.RegisterEnabled }}true{{ else }}false{{ end }}"
                ></div>
            </div>
        </div>
        <!-- Mobile navigation panel. -->
        <div class="site-nav-links app-container lg:hidden" id="mainNavbar" data-nav-menu data-open="false">
            <a class="site-nav-link" href="/posts">文章</a>
            <!-- Mobile account actions, mounted by frontend/src/components/HeaderActions. -->
            <div
                class="contents"
                data-header-actions
                data-variant="mobile"
                data-register-enabled="{{ if .Site.RegisterEnabled }}true{{ else }}false{{ end }}"
            ></div>
        </div>
    </nav>
</header>
{{ end }}
