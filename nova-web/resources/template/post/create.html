{{ define "content" }}
<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h1 class="h5 mb-0">Create Post</h1>
                </div>
                <div class="card-body">
                    {{if .Error}}
                    <div class="alert alert-danger" role="alert">{{.Error}}</div>
                    {{end}}
                    <form method="POST" action="/posts">
                        <input type="hidden" name="_csrf" value="{{ .CSRFToken }}">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ if .Post }}{{ .Post.Title }}{{ end }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="content" class="form-label">Content</label>
                            <textarea class="form-control" id="content" name="content" rows="10" required>{{ if .Post }}{{ .Post.Content }}{{ end }}</textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Create</button>
                            <a href="/posts" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{{ end }}

{{ define "head" }}
<style>
/* Custom styles for the post create page */
</style>
<script>
// You can add any JavaScript code specific to the post create page here
</script>
{{ end }}
