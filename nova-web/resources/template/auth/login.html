{{ define "content" }}
<div class="app-container-form">
    <div class="ui-card">
        <div class="ui-card-header">
            <h1 class="ui-title">登录</h1>
        </div>
        <div class="ui-card-body">
            {{range .Flashes}}
            <div class="ui-alert-{{.Level | alertType}}" role="alert">{{.Message}}</div>
            {{end}}
            <form action="/login" method="POST" class="space-y-4">
                <input type="hidden" name="_csrf" value="{{ .CSRFToken }}">
                <div>
                    <label for="username" class="ui-label">用户名</label>
                    <input type="text" name="username" id="username" class="ui-input" value="{{ .Username }}" required />
                </div>
                <div>
                    <label for="password" class="ui-label">密码</label>
                    <input type="password" name="password" id="password" class="ui-input" required />
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" class="ui-checkbox" id="remember" name="remember">
                    <label class="text-sm text-slate-700" for="remember">记住我</label>
                </div>
                <button class="ui-button-primary w-full" type="submit">登录</button>
            </form>
            <div class="mt-4 text-center text-sm">
                <span class="text-slate-500">没有账号？</span>
                <a href="/register">注册</a>
            </div>
        </div>
    </div>
</div>
{{ end }}
