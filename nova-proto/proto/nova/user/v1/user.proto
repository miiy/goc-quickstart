syntax = "proto3";

package nova.user.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/miiy/goc-quickstart/nova-user/gen/go/nova/user/v1;novauserv1";
option java_package = "com.github.miiy.nova.user.v1";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "User API"
    version: "1.0"
    contact: {
      name: "nova project"
      url: "https://github.com/miiy/goc-quickstart"
      email: "none@example.com"
    }
    license: {
      name: "MIT License"
      url: "https://github.com/miiy/goc-quickstart/LICENSE"
    }
  }
  external_docs: {
    url: "https://github.com/grpc-ecosystem/grpc-gateway"
    description: "More about goc"
  }
  schemes: HTTP
  schemes: HTTPS
  schemes: WSS
};

// UserStatus describes the lifecycle state of a user account.
enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_DISABLE = 2;
}

// User describes the public profile and account state for a user.
message User {
  int64 id = 1;
  string username = 2;
  string nickname = 3;
  string avatar = 4;
  string email = 5;
  google.protobuf.Timestamp email_verified_time = 6;
  string phone = 7;
  UserStatus status = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  google.protobuf.Timestamp deleted_at = 11;
}

// GetUserRequest identifies a user by id.
message GetUserRequest {
  int64 id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).int64.gt = 0
  ];
}

// GetUserResponse returns a single user.
message GetUserResponse {
  User user = 1;
}

// BatchGetUsersRequest identifies multiple users by id.
message BatchGetUsersRequest {
  repeated int64 ids = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).repeated = {
      min_items: 1
      items: {
        int64: {gt: 0}
      }
    }
  ];
}

// BatchGetUsersResponse returns users matched by ids.
message BatchGetUsersResponse {
  repeated User users = 1;
}

// UpdateUserRequest carries profile fields to update for a user.
message UpdateUserRequest {
  int64 id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).int64.gt = 0
  ];
  User user = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
  google.protobuf.FieldMask update_mask = 3;
}

// UpdateUserResponse returns the updated user.
message UpdateUserResponse {
  User user = 1;
}

// ListUsersRequest carries pagination options for listing users.
message ListUsersRequest {
  int32 page = 1 [(buf.validate.field).int32.gte = 0];
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
}

// ListUsersResponse returns a paginated list of users.
message ListUsersResponse {
  int64 total = 1;
  int32 total_pages = 2;
  int32 page_size = 3;
  int32 current_page = 4;
  repeated User users = 5;
}

// UserService manages user profiles and lookup operations.
service UserService {
  // GetUser returns a single user by id.
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (google.api.http) = {get: "/api/v1/users/{id}"};
  }

  // BatchGetUsers returns multiple users by ids.
  rpc BatchGetUsers(BatchGetUsersRequest) returns (BatchGetUsersResponse) {
    option (google.api.http) = {get: "/api/v1/users/batch"};
  }

  // UpdateUser updates mutable profile fields for a user.
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (google.api.http) = {
      put: "/api/v1/users/{id}"
      body: "*"
    };
  }

  // ListUsers returns a paginated list of users.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {get: "/api/v1/users"};
  }
}
