register:
  post:
    tags:
      - Auth
    operationId: register
    summary: Register a user
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/auth.yaml#/RegisterRequest
    responses:
      '200':
        description: Registered user identity.
        content:
          application/json:
            schema:
              $ref: ../schemas/auth.yaml#/RegisterResponse
      default:
        description: Error response.
        content:
          application/json:
            schema:
              $ref: ../../../common/v1/schemas/error.yaml#/ErrorResponse
