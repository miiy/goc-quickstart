UserStatus:
  type: string
  description: Lifecycle state of a user account.
  enum:
    - unspecified
    - active
    - disabled
  x-enum-varnames:
    - USER_STATUS_UNSPECIFIED
    - USER_STATUS_ACTIVE
    - USER_STATUS_DISABLED
User:
  type: object
  description: Public profile and account state for a user.
  required:
    - id
    - username
    - nickname
    - avatar
    - email
    - phone
    - status
    - created_at
    - updated_at
  properties:
    id:
      type: integer
      format: int64
    username:
      type: string
    nickname:
      type: string
    avatar:
      type: string
      description: Browser-readable avatar URL, for example /uploads/avatars/2026/07/a.png.
    email:
      type: string
      format: email
    email_verified_time:
      type: string
      format: date-time
      nullable: true
    phone:
      type: string
    status:
      $ref: '#/UserStatus'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    deleted_at:
      type: string
      format: date-time
      nullable: true
PublicUser:
  type: object
  description: Public user profile fields safe for anonymous reads.
  required:
    - id
    - username
    - nickname
    - avatar
    - created_at
    - updated_at
  properties:
    id:
      type: integer
      format: int64
    username:
      type: string
    nickname:
      type: string
    avatar:
      type: string
      description: Browser-readable avatar URL, for example /uploads/avatars/2026/07/a.png.
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
UserInput:
  type: object
  description: Mutable user profile fields accepted by the gateway.
  properties:
    nickname:
      type: string
    avatar:
      type: string
      description: Avatar object key or /uploads URL returned by avatar upload.
    email:
      type: string
      format: email
    phone:
      type: string
    status:
      $ref: '#/UserStatus'
GetUserResponse:
  type: object
  required:
    - user
  properties:
    user:
      $ref: '#/PublicUser'
GetProfileResponse:
  type: object
  required:
    - user
  properties:
    user:
      $ref: '#/User'
UpdateProfileRequest:
  type: object
  required:
    - user
  properties:
    user:
      $ref: '#/UserInput'
    update_fields:
      type: array
      description: Mutable user fields to update.
      items:
        type: string
        enum:
          - nickname
          - avatar
          - email
          - phone
          - status
      example:
        - nickname
        - avatar
UpdateProfileResponse:
  type: object
  required:
    - user
  properties:
    user:
      $ref: '#/User'
ListUsersResponse:
  type: object
  required:
    - total
    - total_pages
    - page_size
    - current_page
    - users
  properties:
    total:
      type: integer
      format: int64
    total_pages:
      type: integer
      format: int32
    page_size:
      type: integer
      format: int32
    current_page:
      type: integer
      format: int32
    users:
      type: array
      items:
        $ref: '#/User'
