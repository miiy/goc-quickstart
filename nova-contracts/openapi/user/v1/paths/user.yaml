users:
  get:
    tags:
      - Users
    operationId: listUsers
    summary: List users
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          format: int32
          minimum: 0
        description: Page number.
      - name: page_size
        in: query
        schema:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        description: Number of users per page.
    responses:
      '200':
        description: Paginated users.
        content:
          application/json:
            schema:
              $ref: ../schemas/user.yaml#/ListUsersResponse
      default:
        description: Error response.
        content:
          application/json:
            schema:
              $ref: ../../../common/v1/schemas/error.yaml#/ErrorResponse
usersBatch:
  get:
    tags:
      - Users
    operationId: batchGetUsers
    summary: Batch get users
    parameters:
      - name: ids
        in: query
        required: true
        schema:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
            minimum: 1
        style: form
        explode: true
        description: User ids. Repeated query values and comma-separated values are both accepted by the gateway.
    responses:
      '200':
        description: Users matched by ids.
        content:
          application/json:
            schema:
              $ref: ../schemas/user.yaml#/BatchGetUsersResponse
      default:
        description: Error response.
        content:
          application/json:
            schema:
              $ref: ../../../common/v1/schemas/error.yaml#/ErrorResponse
userById:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: User id.
  get:
    tags:
      - Users
    operationId: getUser
    summary: Get a user
    responses:
      '200':
        description: User detail.
        content:
          application/json:
            schema:
              $ref: ../schemas/user.yaml#/GetUserResponse
      default:
        description: Error response.
        content:
          application/json:
            schema:
              $ref: ../../../common/v1/schemas/error.yaml#/ErrorResponse
  put:
    tags:
      - Users
    operationId: updateUser
    summary: Update a user
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/user.yaml#/UpdateUserRequest
    responses:
      '200':
        description: Updated user.
        content:
          application/json:
            schema:
              $ref: ../schemas/user.yaml#/UpdateUserResponse
      default:
        description: Error response.
        content:
          application/json:
            schema:
              $ref: ../../../common/v1/schemas/error.yaml#/ErrorResponse
