users:
  get:
    tags:
      - Users
    operationId: listUsers
    summary: List users
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          format: int32
          minimum: 0
        description: Page number.
      - name: page_size
        in: query
        schema:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        description: Number of users per page.
    responses:
      '200':
        description: Paginated users.
        content:
          application/json:
            schema:
              $ref: ../schemas/user.yaml#/ListUsersResponse
      default:
        description: Error response.
        content:
          application/json:
            schema:
              $ref: ../../../common/v1/schemas/error.yaml#/ErrorResponse
userByUsername:
  parameters:
    - name: username
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 255
      description: Username.
  get:
    tags:
      - Users
    operationId: getUser
    summary: Get a user
    responses:
      '200':
        description: Public user detail.
        content:
          application/json:
            schema:
              $ref: ../schemas/user.yaml#/GetUserResponse
      default:
        description: Error response.
        content:
          application/json:
            schema:
              $ref: ../../../common/v1/schemas/error.yaml#/ErrorResponse
profile:
  get:
    tags:
      - Users
    operationId: getProfile
    summary: Get current user's profile
    responses:
      '200':
        description: Current user profile.
        content:
          application/json:
            schema:
              $ref: ../schemas/user.yaml#/GetProfileResponse
      default:
        description: Error response.
        content:
          application/json:
            schema:
              $ref: ../../../common/v1/schemas/error.yaml#/ErrorResponse
  put:
    tags:
      - Users
    operationId: updateProfile
    summary: Update current user's profile
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/user.yaml#/UpdateProfileRequest
    responses:
      '200':
        description: Updated current user profile.
        content:
          application/json:
            schema:
              $ref: ../schemas/user.yaml#/UpdateProfileResponse
      default:
        description: Error response.
        content:
          application/json:
            schema:
              $ref: ../../../common/v1/schemas/error.yaml#/ErrorResponse
