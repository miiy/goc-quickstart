PostStatus:
  type: string
  description: Publication state of a post.
  enum:
    - unspecified
    - draft
    - published
    - pending_review
  x-enum-varnames:
    - POST_STATUS_UNSPECIFIED
    - POST_STATUS_DRAFT
    - POST_STATUS_PUBLISHED
    - POST_STATUS_PENDING_REVIEW
Post:
  type: object
  description: Article published by a user.
  required:
    - id
    - user_id
    - title
    - content
    - status
    - tags
    - category_id
    - created_at
    - updated_at
    - user
    - cover_url
  properties:
    id:
      type: string
      description: Public post id used in URLs.
    user_id:
      type: integer
      format: int64
    user:
      $ref: '#/PostUser'
    title:
      type: string
    summary:
      type: string
      maxLength: 512
    content:
      type: string
    status:
      $ref: '#/PostStatus'
    tags:
      type: array
      items:
        type: string
    category_id:
      type: integer
      format: int64
    published_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    deleted_at:
      type: string
      format: date-time
      nullable: true
    cover_url:
      type: string
      description: Browser-readable cover image URL, for example /uploads/post-covers/2026/07/a.png.
    can_manage:
      type: boolean
      description: Whether the authenticated caller can manage this post.
PostUser:
  type: object
  description: User display fields populated by nova-gateway from nova-user.
  required:
    - username
    - nickname
    - avatar
  properties:
    username:
      type: string
    nickname:
      type: string
    avatar:
      type: string
      description: Browser-readable avatar URL, for example /uploads/avatars/2026/07/a.png.
CreatePostInput:
  type: object
  description: Post fields accepted when creating a post.
  required:
    - title
    - content
  properties:
    title:
      type: string
      minLength: 1
    summary:
      type: string
      maxLength: 512
    content:
      type: string
    status:
      $ref: '#/PostStatus'
    tags:
      type: array
      items:
        type: string
    category_id:
      type: integer
      format: int64
    cover_url:
      type: string
      description: Cover image object key or /uploads URL returned by file upload.
    published_at:
      type: string
      format: date-time
      nullable: true
UpdatePostInput:
  type: object
  description: Mutable post fields accepted when updating a post.
  properties:
    title:
      type: string
      minLength: 1
    summary:
      type: string
      maxLength: 512
    content:
      type: string
    status:
      $ref: '#/PostStatus'
    tags:
      type: array
      items:
        type: string
    category_id:
      type: integer
      format: int64
    cover_url:
      type: string
      description: Cover image object key or /uploads URL returned by file upload.
    published_at:
      type: string
      format: date-time
      nullable: true
CreatePostRequest:
  type: object
  required:
    - post
  properties:
    post:
      $ref: '#/CreatePostInput'
CreatePostResponse:
  type: object
  required:
    - post
  properties:
    post:
      $ref: '#/Post'
GetPostResponse:
  type: object
  required:
    - post
  properties:
    post:
      $ref: '#/Post'
UpdatePostRequest:
  type: object
  required:
    - post
  properties:
    post:
      $ref: '#/UpdatePostInput'
    update_fields:
      type: array
      description: Mutable post fields to update.
      items:
        type: string
        enum:
          - title
          - summary
          - content
          - cover_url
          - published_at
          - status
          - tags
          - category_id
      example:
        - title
        - summary
        - content
        - cover_url
UpdatePostResponse:
  type: object
  required:
    - post
  properties:
    post:
      $ref: '#/Post'
ListPostsResponse:
  type: object
  required:
    - total
    - total_pages
    - page_size
    - current_page
    - posts
  properties:
    total:
      type: integer
      format: int64
    total_pages:
      type: integer
      format: int32
    page_size:
      type: integer
      format: int32
    current_page:
      type: integer
      format: int32
    posts:
      type: array
      items:
        $ref: '#/Post'
DeletePostResponse:
  type: object
  additionalProperties: false
