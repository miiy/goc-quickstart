PostStatus:
  type: string
  description: Publication state of a post.
  enum:
    - unspecified
    - draft
    - published
  x-enum-varnames:
    - POST_STATUS_UNSPECIFIED
    - POST_STATUS_DRAFT
    - POST_STATUS_PUBLISHED
Post:
  type: object
  description: Article published by a user.
  required:
    - id
    - author_id
    - title
    - content
    - status
    - tags
    - category_id
    - created_at
    - updated_at
    - author_name
    - cover_url
  properties:
    id:
      type: integer
      format: int64
    author_id:
      type: integer
      format: int64
    title:
      type: string
    content:
      type: string
    status:
      $ref: '#/PostStatus'
    tags:
      type: array
      items:
        type: string
    category_id:
      type: integer
      format: int64
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    deleted_at:
      type: string
      format: date-time
      nullable: true
    author_name:
      type: string
      description: Populated by nova-gateway from nova-user for web responses.
    cover_url:
      type: string
CreatePostInput:
  type: object
  description: Post fields accepted when creating a post.
  required:
    - title
    - content
  properties:
    title:
      type: string
      minLength: 1
    content:
      type: string
    status:
      $ref: '#/PostStatus'
    tags:
      type: array
      items:
        type: string
    category_id:
      type: integer
      format: int64
    cover_url:
      type: string
UpdatePostInput:
  type: object
  description: Mutable post fields accepted when updating a post.
  properties:
    title:
      type: string
      minLength: 1
    content:
      type: string
    status:
      $ref: '#/PostStatus'
    tags:
      type: array
      items:
        type: string
    category_id:
      type: integer
      format: int64
    cover_url:
      type: string
CreatePostRequest:
  type: object
  required:
    - post
  properties:
    post:
      $ref: '#/CreatePostInput'
CreatePostResponse:
  type: object
  required:
    - post
  properties:
    post:
      $ref: '#/Post'
GetPostResponse:
  type: object
  required:
    - post
  properties:
    post:
      $ref: '#/Post'
UpdatePostRequest:
  type: object
  required:
    - post
  properties:
    post:
      $ref: '#/UpdatePostInput'
    update_fields:
      type: array
      description: Mutable post fields to update.
      items:
        type: string
        enum:
          - title
          - content
          - cover_url
          - status
          - tags
          - category_id
      example:
        - title
        - content
        - cover_url
UpdatePostResponse:
  type: object
  required:
    - post
  properties:
    post:
      $ref: '#/Post'
ListPostsResponse:
  type: object
  required:
    - total
    - total_pages
    - page_size
    - current_page
    - posts
  properties:
    total:
      type: integer
      format: int64
    total_pages:
      type: integer
      format: int32
    page_size:
      type: integer
      format: int32
    current_page:
      type: integer
      format: int32
    posts:
      type: array
      items:
        $ref: '#/Post'
DeletePostResponse:
  type: object
  additionalProperties: false
