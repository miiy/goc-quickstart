syntax = "proto3";

option go_package = "github.com/miiy/goc-quickstart/auth-service/gen/go/blog/auth/v1;blogauthv1";
option java_multiple_files = true;
option java_outer_classname = "AuthProto";
option java_package = "com.github.miiy.goc.blog.auth.api.v1";

package goc.blog.auth.api.v1;

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "buf/validate/validate.proto";

// authenticated user
message User {
  string username = 1;
}

// register (email + username + password)
message RegisterRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string username = 2 [(google.api.field_behavior) = REQUIRED];
  string password = 3 [(google.api.field_behavior) = REQUIRED];
  string password_confirmation = 4 [(google.api.field_behavior) = REQUIRED];
}

message RegisterResponse {
  User user = 1;
}

// register check
message FieldCheckRequest {
  string value = 1 [(google.api.field_behavior) = REQUIRED];
}

message FieldCheckResponse {
  bool exist = 1;
}

// login (username/email + password)
message LoginRequest {
  string username = 1 [(google.api.field_behavior) = REQUIRED];
  string password = 2 [(google.api.field_behavior) = REQUIRED];
}

message LoginResponse {
  string token_type = 1;
  string access_token = 2;
  google.protobuf.Timestamp expires_at = 3;
  User user = 4;
}

// send sms code
message SendSmsCodeRequest {
  string phone = 1 [(google.api.field_behavior) = REQUIRED];
}

message SendSmsCodeResponse {
}

// phone auth (auto register if not exists)
message PhoneAuthRequest {
  string phone = 1 [(google.api.field_behavior) = REQUIRED];
  string code = 2 [(google.api.field_behavior) = REQUIRED];
}

message PhoneAuthResponse {
  string token_type = 1;
  string access_token = 2;
  google.protobuf.Timestamp expires_at = 3;
  User user = 4;
}

// wechat mini program login
message MpLoginRequest {
  string code = 1 [(google.api.field_behavior) = REQUIRED];
}

// refresh token
message RefreshTokenRequest {
  string access_token = 1;
}

message RefreshTokenResponse {
  string token_type = 1;
  string access_token = 2;
  google.protobuf.Timestamp expires_at = 3;
  User user = 4;
}

// logout
message LogoutRequest {
  string access_token = 1;
}

message LogoutResponse {
}

service AuthService {
  // register
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/register",
      body: "*"
    };
  }

  // register check
  rpc UsernameCheck(FieldCheckRequest) returns (FieldCheckResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/register/username_check",
      body: "*"
    };
  }

  rpc EmailCheck(FieldCheckRequest) returns (FieldCheckResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/register/email_check",
      body: "*"
    };
  }

  rpc PhoneCheck(FieldCheckRequest) returns (FieldCheckResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/register/phone_check",
      body: "*"
    };
  }

  // login
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/login",
      body: "*"
    };
  }

  // phone: send sms code → phone auth
  rpc SendSmsCode(SendSmsCodeRequest) returns (SendSmsCodeResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/send_sms_code",
      body: "*"
    };
  }

  rpc PhoneAuth(PhoneAuthRequest) returns (PhoneAuthResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/phone_auth",
      body: "*"
    };
  }

  // wechat login
  rpc MpLogin(MpLoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/mplogin",
      body: "*"
    };
  }

  // token
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/token/refresh",
      body: "*"
    };
  }

  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/logout",
      body: "*"
    };
  }
}
