syntax = "proto3";

package blog.upload.v1;

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/miiy/goc-quickstart/upload-service/gen/go/blog/upload/v1;bloguploadv1";
option java_package = "com.github.miiy.blog.upload.v1";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Upload API"
    version: "1.0"
    contact: {
      name: "blog project"
      url: "https://github.com/miiy/goc-quickstart"
      email: "none@example.com"
    }
    license: {
      name: "MIT License"
      url: "https://github.com/miiy/goc-quickstart/LICENSE"
    }
  }
  external_docs: {
    url: "https://github.com/grpc-ecosystem/grpc-gateway"
    description: "More about goc"
  }
  schemes: HTTP
  schemes: HTTPS
  schemes: WSS
};

// UploadScene describes the business scene for an uploaded file.
enum UploadScene {
  UPLOAD_SCENE_UNSPECIFIED = 0;
  UPLOAD_SCENE_AVATAR = 1;
}

// UploadStatus describes the lifecycle state of an uploaded file.
enum UploadStatus {
  UPLOAD_STATUS_UNSPECIFIED = 0;
  UPLOAD_STATUS_ACTIVE = 1;
  UPLOAD_STATUS_DELETED = 2;
}

// Upload describes a file stored by the upload service.
message Upload {
  int64 id = 1;
  int64 owner_id = 2;
  string owner_type = 3;
  UploadScene scene = 4;
  string object_key = 5;
  string url = 6;
  string mime_type = 7;
  int64 size = 8;
  string checksum = 9;
  UploadStatus status = 10;
  int64 created_by = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  google.protobuf.Timestamp deleted_at = 14;
}

// CreateUploadRequest carries file content and metadata for storage.
message CreateUploadRequest {
  UploadScene scene = 1 [(google.api.field_behavior) = REQUIRED];
  string filename = 2;
  string mime_type = 3 [(google.api.field_behavior) = REQUIRED];
  bytes content = 4 [(google.api.field_behavior) = REQUIRED];
}

// CreateUploadResponse returns the stored upload record.
message CreateUploadResponse {
  Upload upload = 1;
}

// UploadService stores files and returns upload records.
service UploadService {
  // CreateUpload stores file content through the internal gRPC API.
  rpc CreateUpload(CreateUploadRequest) returns (CreateUploadResponse);
}
