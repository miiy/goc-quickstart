{{ define "content" }}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">登录</h4>
                </div>
                <div class="card-body">
                    {{range .Flashes}}
                    <div class="alert alert-{{.Level | alertType}}" role="alert">{{.Message}}</div>
                    {{end}}
                    <form action="/login" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">用户名</label>
                            <input type="text" name="username" id="username" class="form-control" value="{{ .Username }}" required />
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" name="password" id="password" class="form-control" required />
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">记住我</label>
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" type="submit">登录</button>
                        </div>
                    </form>
                    <div class="mt-3 text-center">
                        <span class="text-body-secondary">没有账号？</span>
                        <a href="/register">注册</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{{ end }}

{{ define "head" }}
<style>
/* Custom styles for the login page */
</style>
<script>
// You can add any JavaScript code specific to the login page here
</script>
{{ end }}
