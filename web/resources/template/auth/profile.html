{{ define "content" }}
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1 class="h5 mb-0">Profile</h1>
        </div>
        <div class="card-body">
            {{if .User}}
            <p class="card-text">hello, {{ .User.Username }}</p>
            {{end}}
            <form method="POST" action="/auth/logout">
                <input type="hidden" name="_csrf" value="{{ .CSRFToken }}">
                <button class="btn btn-outline-secondary" type="submit">logout</button>
            </form>
        </div>
    </div>
</div>
{{ end }}

{{ define "head" }}
<style>
/* Custom styles for the profile page */
</style>

// You can add any JavaScript code specific to the profile page here
</script>
{{ end }}
