services:
  # Infrastructure
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: goc
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - nova-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nova-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # gRPC Services
  nova-auth:
    build:
      context: ./nova-auth
      dockerfile: Dockerfile
    container_name: nova-auth
    ports:
      - "50051:50051"
    environment:
      - APP_ENV=docker
    volumes:
      - ./nova-auth/config.yaml:/app/config.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nova-network

  nova-user:
    build:
      context: ./nova-user
      dockerfile: Dockerfile
    container_name: nova-user
    ports:
      - "50052:50052"
    environment:
      - APP_ENV=docker
    volumes:
      - ./nova-user/config.yaml:/app/config.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nova-network

  nova-post:
    build:
      context: ./nova-post
      dockerfile: Dockerfile
    container_name: nova-post
    ports:
      - "50053:50053"
    environment:
      - APP_ENV=docker
    volumes:
      - ./nova-post/config.yaml:/app/config.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nova-network

  nova-file:
    build:
      context: ./nova-file
      dockerfile: Dockerfile
    container_name: nova-file
    ports:
      - "50054:50054"
    environment:
      - APP_ENV=docker
    volumes:
      - ./nova-file/config.yaml:/app/config.yaml:ro
      - ./nova-file/storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nova-network

  # API Gateway
  nova-gateway:
    build:
      context: ./nova-gateway
      dockerfile: Dockerfile
    container_name: nova-gateway
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=docker
    volumes:
      - ./nova-gateway/config.yaml:/app/config.yaml:ro
    depends_on:
      - nova-auth
      - nova-user
      - nova-post
      - nova-file
    networks:
      - nova-network

  # Web Frontend
  nova-web:
    build:
      context: ./nova-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
    container_name: nova-web
    ports:
      - "8081:8081"
    environment:
      - APP_ENV=docker
    volumes:
      - ./nova-web/config.yaml:/app/config.yaml:ro
      - ./nova-file/storage/uploads:/nova-file/storage/uploads:ro
    depends_on:
      - nova-gateway
    networks:
      - nova-network

networks:
  nova-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
